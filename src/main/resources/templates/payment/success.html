<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <!-- Success message -->
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="alert alert-success text-center" role="alert">
                <h4 class="alert-heading">Order Successfully Placed!</h4>
                <p>Your order has been placed successfully. Thank you for your purchase!</p>
                <hr>
                <p class="mb-0">Order identifier: <strong th:text="${order_identifier}">order identifier</strong></p>
            </div>

            <div class="text-center">
                <a class="btn btn-primary" href="/" role="button">Go to Homepage</a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (bundled) -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html data-bs-theme="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Cart - Onyx Store</title>
  <link rel="stylesheet" href="/main/style/assets/bootstrap/css/bootstrap.min.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-md bg-dark py-3" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand" href="/">ONYX STORE</a>
    <button data-bs-toggle="collapse" class="navbar-toggler" data-bs-target="#navcol-1">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navcol-1">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Empty Cart Container -->
<div class="container py-5">
  <h2 class="text-center mb-4">Shopping Cart</h2>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h4>Your cart is empty.</h4>
          <p class="mt-3 text-muted">Looks like you haven't added anything to your cart yet.</p>
          <a href="/" class="btn btn-outline-secondary mt-4">Continue Shopping</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/main/style/assets/bootstrap/js/bootstrap.min.js"></script>
</body>
</html>
